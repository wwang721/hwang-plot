name: auto-plot

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.csv'

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.csv'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-figures:
    if: github.actor == 'wwang721'
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      # Strongly recommended if you use matplotlib:
      - name: Force headless plotting backend
        run: |
          echo "MPLBACKEND=Agg" >> $GITHUB_ENV

      - name: Restore font cache
        id: font-cache
        uses: actions/cache@v4
        with:
          path: ~/cached-fonts
          key: ${{ runner.os }}-font-cache-v1

      - name: Install Microsoft core fonts
        if: steps.font-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ttf-mscorefonts-installer fonts-noto-cjk fontconfig

          mkdir -p ~/cached-fonts
          sudo cp -r /usr/share/fonts/truetype/msttcorefonts ~/cached-fonts/
          sudo cp -r /usr/share/fonts/opentype/noto ~/cached-fonts/
          sudo fc-cache -f -v

      - name: Restore fonts to system
        if: steps.font-cache.outputs.cache-hit == 'true'
        run: |
          sudo mkdir -p /usr/share/fonts/truetype
          sudo mkdir -p /usr/share/fonts/opentype

          sudo cp -r ~/cached-fonts/msttcorefonts /usr/share/fonts/truetype/
          sudo cp -r ~/cached-fonts/noto /usr/share/fonts/opentype/

          sudo fc-cache -f -v
          rm -rf ~/.cache/matplotlib
      
      - name: Check installed fonts
        run: |
          fc-list | grep -i "Times New Roman" || true
          fc-list | grep -i "Noto Serif CJK" || true

      # Option A: run every script under a folder (e.g. plots/)
      - name: Run python scripts
        run: |
          uv run python --version

          # cd example
          # uv run vel_field.py
          # cd ..
          cd figure1
          # uv run font_test.py
          uv run plot.py
          # uv run plot2.py
          cd ..
          cd figure2
          uv run plot1.py
          uv run plot3.py
          cd ..

      - name: Push to GitHub
        uses: EndBug/add-and-commit@v7.2.1
        with:
          branch: main
          message: ":bento: Generate figures [bot]"
          add: "**/*.png"
          default_author: github_actions
